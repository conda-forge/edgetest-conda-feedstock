{% set name = "edgetest-conda" %}
{% set version = "2026.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 5bfa967668ac3fe600ae05ad18ab07775d372e53ab956b99fcf6360570a9e4a0

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install -vv --no-deps .

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - edgetest >=2021.12.3
    - conda
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - edgetest_conda.plugin

about:
  home: https://github.com/capitalone/edgetest-conda
  license: Apache-2.0
  license_family: APACHE
  license_file: LICENSE
  summary: edgetest-conda is a conda plugin for edgetest
  description: |
    This plugin allows users to create virtual environments using conda instead of venv when using edgetest
  doc_url: https://capitalone.github.io/edgetest-conda
  dev_url: https://github.com/capitalone/edgetest-conda

extra:
  recipe-maintainers:
    - gladysteh99
    - jdawang
    - NikhilJArora
    - fdosani
    - ak-gupta
